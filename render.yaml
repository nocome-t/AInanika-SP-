services:
  - type: web
    name: ainanika-web
    runtime: node
    plan: starter
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: HOST
        value: 0.0.0.0
      - key: NODE_VERSION
        value: 22
      - key: OPENAI_MODEL
        value: gpt-5-mini
      - key: RATE_LIMIT_MAX
        value: 24
      - key: OPENAI_API_KEY
        sync: false
